name: "Go Test"

# Run tests on push and pull request for all branches.
# To require this workflow to pass before merging into `main`,
# enable branch protection in the repository settings and add
# this workflow's check (named "Go Test") as a required status check for the `main` branch.
on:
  push: {}
  pull_request: {}

permissions:
  contents: read

jobs:
  test:
    name: Go Test
    runs-on: ubuntu-latest
    concurrency:
      group: go-test-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          # Pick an appropriate Go version for your project. You can change this as needed.
          go-version: 1.20

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Enable Go modules
        run: go env -w GO111MODULE=on

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        env:
          # ensure modules mode and consistent output
          GOFLAGS: "-mod=mod"
        run: |
          go test ./... -v
