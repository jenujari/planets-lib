name: "Go Test"

# Run tests on push and pull request for all branches.
# To require this workflow to pass before merging into `main`,
# enable branch protection in the repository settings and add
# this workflow's check (named "Go Test") as a required status check for the `main` branch.
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for running this"
        required: false
        default: "Manual trigger"
permissions:
  contents: read

jobs:
  test:
    name: Go Test
    runs-on: ubuntu-latest
    concurrency:
      group: go-test-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          # Pick an appropriate Go version for your project. You can change this as needed.
          go-version: 1.25.6

      - name: Download dependencies
        run: go mod download

      - name: Run golangci-lint
        run: go tool golangci-lint run -v

      - name: Run tests with coverage
        run: |
          go test ./... -v -coverprofile=coverage.out
          go tool cover -func=coverage.out | tee coverage-summary.txt

      - name: Generate Job Summary
        run: |
          echo "### Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat coverage-summary.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          echo "### Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat benchmark-results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

      - name: Run benchmarks
        run: |
          go test ./... -bench=. -run=^$ -benchmem | tee benchmark-results.txt

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.txt
