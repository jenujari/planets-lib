version: "2"

run:
  concurrency: 4
  tests: true

linters:
  enable:
    - dupl
    - gocyclo
    - gosec
    - misspell
    - revive
    - unconvert
  settings:
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: true
      check-blank: true
    gocyclo:
      min-complexity: 15
    misspell:
      locale: US
    revive:
      severity: warning
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - misspell
        text: '`TEH` is a misspelling of `THE`'
    paths:
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/jenujari/planets-lib
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
